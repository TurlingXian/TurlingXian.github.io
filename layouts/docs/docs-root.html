{{ define "main" }}
<div class="row flex-xl-nowrap">
    <div class="col-12 container-fluid">

        <h1 class="display-4 mb-4 mt-4">{{ .Title }}</h1>

        <div class="content-intro mb-5">
            {{ .Content }}
        </div>

        <hr class="my-5">

        <h3 class="mb-3">📚 Topics</h3>
        {{ if .Pages }}
        <div class="row">
            {{ range .Pages }}
            <div class="col-12 col-md-6 col-lg-4 mb-4">
                <div class="card h-100 shadow-sm hover-shadow transition-all">
                    <div class="card-body">
                        <h5 class="card-title">
                            {{ if .Params.icon }}
                            <span class="material-icons align-middle me-2 text-success">{{ .Params.icon }}</span>
                            {{ end }}
                            <a href="{{ .RelPermalink }}" class="text-decoration-none stretched-link">{{ .Title }}</a>
                        </h5>
                        <p class="card-text text-muted small">
                            {{ .Description | default .Summary | truncate 80 }}
                        </p>
                    </div>
                </div>
            </div>
            {{ end }}
        </div>
        {{ end }}

    </div>
</div>

<style>
    .hover-shadow:hover {
        box-shadow: 0 .5rem 1rem rgba(0, 0, 0, .15) !important;
        transform: translateY(-2px);
    }

    .transition-all {
        transition: all 0.3s ease;
    }
</style>
{{ end }}
