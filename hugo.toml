baseURL = 'https://momoalison.github.io/'
languageCode = 'en-us'
title = 'My Knowledge Base'

[module]
  [[module.imports]]
    path = "github.com/colinwilson/lotusdocs"
    disable = false
  [[module.imports]]
    path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
    disable = false

[markup.goldmark.renderer]
  unsafe = true

[markup.highlight]
  codeFences = true
  guessSyntax = true
  lineNos = true
  style = "github-dark"

[params]
  description = "A Notion-style knowledge base built with Hugo and Lotus Docs"
  logo = "images/avatar.png"

  github_repo = "https://github.com/momoAlison/momoAlison.github.io"
  github_branch = "main"
  custom_css = ["css/custom.css"]

  [params.docs]
    pathName = "docs"
    darkMode = true
    prism = true
    themeColor = "emerald"

  [params.social]
    github = "momoAlison/momoalison.github.io"

  [params.editPage]
    enable = true
    text = "Edit this page on GitHub"

  [params.sidebar]
    generateDynamicSidebar = true
    collapsed = false
    title = "Explorer"
    open = true

  [params.toc]
    enable = true
    maxDepth = 3

  [params.search]
    enable = true
    placeholder = "Search docs..."

[[menu.main]]
  name = "Docs"
  url = "/docs/"
  weight = 10

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 20